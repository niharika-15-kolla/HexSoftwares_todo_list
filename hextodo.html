<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To Do App</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      position: absolute;
      top: 2%;
      text-align: center;
      width: 100%;
      animation: fadeDown 1s ease;
    }

    .header h1 {
      font-size: 34px;
      background: linear-gradient(90deg, #60a5fa, #3b82f6, #9333ea);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientMove 3s linear infinite;
    }

    .header p {
      color: #94a3b8;
      font-size: 15px;
      animation: fadeUp 1.5s ease;
    }

    /* MAIN */
    .main {
      display: flex;
      gap: 25px;
      margin-top: 120px;
      animation: fadeUp 1s ease;
    }

    .container, .task-container {
      background: rgba(30, 41, 59, 0.9);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: 0.3s;
    }

    .container:hover, .task-container:hover {
      transform: translateY(-5px);
    }

    h1 {
      text-align: center;
      font-size: 22px;
      color: #60a5fa;
    }

    /* INPUT */
    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: #334155;
      color: white;
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      box-shadow: 0 0 10px #3b82f6;
      transform: scale(1.02);
    }

    /* BUTTON */
    button {
      margin-top: 15px;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg, #3b82f6, #9333ea);
      background-size: 200% auto;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-position: right center;
      transform: scale(1.05);
      box-shadow: 0 0 15px #3b82f6;
    }

    /* DASHBOARD */
    .dashboard {
      margin-bottom: 15px;
      animation: fadeUp 1s ease;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      width: 0%;
      transition: width 0.5s ease-in-out;
    }

    /* TASK */
    .task {
      background: #334155;
      padding: 12px;
      margin-top: 12px;
      border-radius: 10px;
      animation: fadeUp 0.5s ease;
      transition: 0.3s;
    }

    .task:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 0 0 15px rgba(59,130,246,0.5);
    }

    .task.completed {
      opacity: 0.6;
      text-decoration: line-through;
    }

    .task-title { font-weight: bold; }
    .task-desc { font-size: 14px; color: #cbd5f5; }
    .time { font-size: 12px; color: #94a3b8; }

    .actions {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
    }

    .btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .complete-btn {
      background: linear-gradient(90deg, #16a34a, #22c55e);
    }

    .complete-btn:hover {
      box-shadow: 0 0 10px #22c55e;
    }

    .delete-btn {
      background: linear-gradient(90deg, #dc2626, #ef4444);
    }

    .delete-btn:hover {
      box-shadow: 0 0 10px #ef4444;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes gradientMove {
      0% { background-position: 0%; }
      100% { background-position: 200%; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🚀 Master Your Day</h1>
  <p>Turn your plans into achievements.</p>
</div>

<div class="main">

  <div class="container">
    <h1>📝 Your To-Do List</h1>

    <input type="text" id="titleInput" placeholder="What do you want to track?">
    <textarea id="descInput" placeholder="Add description..."></textarea>

    <button onclick="addTask()">Create Task</button>
  </div>

  <div class="task-container">
    <h1>📋 Tasks</h1>

    <div class="dashboard">
      <div class="stats">
        <span>Total: <span id="total">0</span></span>
        <span>Completed: <span id="completed">0</span></span>
      </div>
      <div class="progress-bar">
        <div class="progress" id="progress"></div>
      </div>
    </div>

    <div id="taskList"></div>
  </div>

</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function updateDashboard() {
    const total = tasks.length;
    const completed = tasks.filter(t => t.completed).length;

    document.getElementById("total").textContent = total;
    document.getElementById("completed").textContent = completed;

    const percent = total === 0 ? 0 : (completed / total) * 100;
    document.getElementById("progress").style.width = percent + "%";
  }

  function renderTasks() {
    const list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
      const div = document.createElement("div");
      div.className = "task" + (task.completed ? " completed" : "");

      div.innerHTML = `
        <div class="task-title">${task.title}</div>
        <div class="task-desc">${task.description}</div>
        <div class="time">Created: ${task.time}</div>
        <div class="actions">
          <button class="btn complete-btn" onclick="toggleTask(${index})">Completed</button>
          <button class="btn delete-btn" onclick="deleteTask(${index})">Exit</button>
        </div>
      `;

      list.appendChild(div);
    });

    updateDashboard();
  }

  function addTask() {
    const title = document.getElementById("titleInput").value.trim();
    const description = document.getElementById("descInput").value.trim();

    if (title === "") return;

    const time = new Date().toLocaleString();

    tasks.push({ title, description, completed: false, time });

    document.getElementById("titleInput").value = "";
    document.getElementById("descInput").value = "";

    saveTasks();
    renderTasks();
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
  }

  function toggleTask(index) {
    tasks[index].completed = !tasks[index].completed;
    saveTasks();
    renderTasks();
  }

  
  renderTasks();
</script>

</body>
</html>
